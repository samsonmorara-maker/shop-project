<body>
    <nav class="relative bg-red-300 text font-medium text-xl px-5 py-4">
    <div class="flex items-center justify-between">
                <div>
                <!-- logo -->
                    <h2 class="text-lg md:text-xl">
                        <a href="index.html">UrbanConnect</a>
                    </h2>
                </div>
                 <!--hamburger menu-->
                            <button id="menu"  class="md:hidden text-2xl">☰</button>
                            <!--how the menu will look like-->
                            <div id="Mobile-menu" class="hidden absolute top-full right-0 bg-red-300 shadow-lg rounded-xl p-4 w-52 flex-col mt-4 space-y-3 md:hidden text-lg">

<!-- login form -->
<div class="flex items-center justify-center h-screen">
    <form class="bg-white p-6 rounded-lg shadow-md w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-4">Log in to UrbanConnect</h2>
        <div class="mb-4">
            <label for="email" class="block text-gray-700 mb-2">Email</label>
            <input type="email" id="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your email">
        </div>
        <div class="mb-4">
            <label for="password" class="block text-gray-700 mb-2">Password</label>
            <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your password">
        </div>
        <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">Log in</button>
        <button type="button" class="w-full mt-4 bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400"><a href="signup.html" class="text-green-500 hover:underline">Sign in</a></button>
    </form>
</div>
<script src="index.js"></script>
</body>
